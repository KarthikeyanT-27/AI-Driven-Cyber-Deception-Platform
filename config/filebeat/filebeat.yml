# config/filebeat/filebeat.yml
#
# FIXES applied vs original:
#
# 1. The original used json.keys_under_root: false which left the raw JSON
#    string in [message] and put nothing into the event.  This is correct
#    *if* Logstash does the JSON parsing (which it does via the json filter).
#    No change needed here — but documented explicitly so future maintainers
#    understand the intent.
#
# 2. Added close_inactive and harvester_limit to prevent file handle leaks
#    when honeypot log files are not actively growing.
#
# 3. Added backoff/max_backoff so Filebeat doesn't hammer Logstash with
#    retries on startup before Logstash is ready.
#
# 4. Added queue.mem settings to buffer events during brief Logstash
#    unavailability (e.g. rolling restart) instead of dropping them.

filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/cowrie/cowrie.json
    fields:
      source: cowrie
    fields_under_root: false
    # Keep JSON as raw string in [message]; Logstash parses it.
    json.keys_under_root: false
    json.add_error_key: true
    close_inactive: 5m
    harvester_limit: 10

  - type: log
    enabled: true
    paths:
      - /var/log/dionaea/dionaea.json
    fields:
      source: dionaea
    fields_under_root: false
    json.keys_under_root: false
    json.add_error_key: true
    close_inactive: 5m
    harvester_limit: 10

  - type: log
    enabled: true
    paths:
      - /var/log/elastichoney/elastichoney.json
    fields:
      source: elastichoney
    fields_under_root: false
    json.keys_under_root: false
    json.add_error_key: true
    close_inactive: 5m
    harvester_limit: 10

output.logstash:
  hosts: ["logstash:5044"]
  # FIX: back off on connection failures instead of hammering Logstash.
  backoff.init: 1s
  backoff.max: 60s

# In-memory queue: buffer up to 4096 events (about 4 MB) across a brief
# Logstash restart rather than dropping them.
queue.mem:
  events: 4096
  flush.min_events: 512
  flush.timeout: 5s

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat.log
  keepfiles: 7

filebeat.config.modules:
  reload.enabled: false
