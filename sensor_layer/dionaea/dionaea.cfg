# Dionaea core config for the demo.
# NOTE: dionaea's config schema has shifted across releases — if the
# upstream base image ships a different default dionaea.cfg, diff against
# it before relying on this in production. This is a minimal demo overlay.

[module]
modules=curl,python,emu,nl

[module.python]
sys_paths=[ "/usr/lib/dionaea/python" ]
service_configs=[ "/etc/dionaea/services-enabled/*.yaml" ]
ihandler_configs=[ "/etc/dionaea/ihandlers-enabled/*.yaml" ]

[module.python.imports]
imports=[ "dionaea.services", "dionaea.ihandlers" ]

[logging]
default.filename=/opt/dionaea/var/log/dionaea/dionaea.log
default.levels=all
default.domains=*

[bistreams]
default.enable=false

[processor.filter_streamdumper.config]
limits.filesize=26214400
limits.files=20
