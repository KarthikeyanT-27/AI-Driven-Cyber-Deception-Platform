name: cyber-deception-platform

# ------------------------------------------------------------------------------
# Network isolation:
#   edge_net  -> attacker-facing honeypots ONLY (no route to core services)
#   core_net  -> internal pipeline + AI services (not attacker reachable)
# Honeypots write to shared log volumes; filebeat (on core_net) tails those
# volumes, so honeypots never need core_net access at all.
# ------------------------------------------------------------------------------
networks:
  edge_net:
    driver: bridge
  core_net:
    driver: bridge

volumes:
  es-data:
  chroma-data:
  redis-data:
  cowrie-logs:
  dionaea-logs:
  elastichoney-logs:
  honeytrap-data:
  # FIX: persist the HuggingFace model cache so DistilBERT is never
  # re-downloaded after the first pull.
  hf-model-cache:

services:
  # ============================== DATA LAYER ==============================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.13.4}
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=${xpack_security_enabled:-false}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks: [core_net]
    # FIX: the original healthcheck works but the start_period was too
    # short for cold starts on slow machines. Raised to 90s and retries
    # to 15 so the container is never declared unhealthy before ES has
    # had time to form its cluster.
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    networks: [core_net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "changeme_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  chromadb:
    image: chromadb/chroma:0.5.0
    container_name: chromadb
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma-data:/chroma/chroma
    ports:
      - "8000:8000"
    networks: [core_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ============================ SENSOR LAYER ===============================
  # Attacker-facing honeypots. Isolated on edge_net only — no path to core
  # services, AI layer, or each other beyond the host's bridge NAT.

  cowrie:
    build:
      context: ./sensor_layer/cowrie
    image: deception/cowrie:latest
    container_name: cowrie
    restart: unless-stopped
    ports:
      - "${COWRIE_SSH_PORT:-2222}:2222"
      - "${COWRIE_TELNET_PORT:-2223}:2223"
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
    networks: [edge_net]
    healthcheck:
        test:
          - CMD
          - /cowrie/cowrie-env/bin/python3
          - -c
          - |
            import socket
            s = socket.create_connection(("127.0.0.1",2222),2)
            s.close()
        interval: 20s
        timeout: 5s
        retries: 5
        start_period: 30s

  dionaea:
    build:
      context: ./sensor_layer/dionaea
    image: deception/dionaea:latest
    container_name: dionaea
    restart: unless-stopped
    ports:
      - "${DIONAEA_FTP_PORT:-2121}:21"
      - "${DIONAEA_HTTP_PORT:-8080}:80"
      - "${DIONAEA_SMB_PORT:-4445}:445"
    volumes:
      - dionaea-logs:/opt/dionaea/var/log/dionaea
    networks: [edge_net]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 21 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  elastichoney:
    build:
      context: ./sensor_layer/elastichoney
    image: deception/elastichoney:latest
    container_name: elastichoney
    restart: unless-stopped
    environment:
      - PORT=${ELASTICHONEY_PORT:-9201}
    ports:
      - "${ELASTICHONEY_PORT:-9201}:9201"
    volumes:
      - elastichoney-logs:/var/log/elastichoney
    networks: [edge_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9201/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ====================== LOG SHIPPING / VISUALIZATION ======================

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION:-8.13.4}
    container_name: logstash
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./config/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    networks: [core_net]
    depends_on:
      elasticsearch:
        condition: service_healthy
    # FIX: the original start_period of 45s is too short for Logstash's JVM
    # startup on cold hardware. Raised to 90s. Also raised retries.
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9600/_node/stats || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s

  filebeat:
    build:
      context: ./config/filebeat
    image: deception/filebeat:latest
    container_name: filebeat
    restart: unless-stopped
    user: root
    volumes:
      - cowrie-logs:/var/log/cowrie:ro
      - dionaea-logs:/var/log/dionaea:ro
      - elastichoney-logs:/var/log/elastichoney:ro
    networks: [core_net]
    depends_on:
      logstash:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep filebeat || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.13.4}
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_HOST}
    ports:
      - "5601:5601"
    networks: [core_net]
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ============================ AI / LOGIC LAYER ============================

  # FIX: escalation-engine no longer depends on elasticsearch at startup.
  # It only needs Redis. Elasticsearch is used for optional persistence
  # inside /evaluate (non-fatal if it fails). This removes a hard startup
  # blocker that caused the engine to stay unhealthy when ES was slow.
  escalation-engine:
    build:
      context: ./escalation_engine
    image: deception/escalation-engine:latest
    container_name: escalation-engine
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ESCALATION_PORT=${ESCALATION_PORT:-8001}
      - ESCALATE_THRESHOLD=${ESCALATE_THRESHOLD:-70}
      - USE_PRETRAINED_NLP=${USE_PRETRAINED_NLP:-true}
      - DISTILBERT_MODEL=${DISTILBERT_MODEL}
      # FIX: persist the HuggingFace model cache across container restarts
      # so DistilBERT is only downloaded once.
      - TRANSFORMERS_CACHE=/hf-cache
      - HF_HOME=/hf-cache
    volumes:
      - hf-model-cache:/hf-cache
    ports:
      - "${ESCALATION_PORT:-8001}:8001"
    networks: [core_net]
    depends_on:
      redis:
        condition: service_healthy
    # FIX: start_period raised to 120s. The DistilBERT model load takes
    # 30-60s on first run even from a warm cache. Without this buffer,
    # Docker marks the container unhealthy before the model finishes
    # loading and restarts it, causing an infinite restart loop.
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  telemetry:
    build:
      context: ./telemetry
    image: deception/telemetry:latest
    container_name: telemetry
    restart: unless-stopped
    env_file: .env
    environment:
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TELEMETRY_PORT=${TELEMETRY_PORT:-8003}
      - ESCALATION_URL=http://escalation-engine:${ESCALATION_PORT:-8001}
    ports:
      - "${TELEMETRY_PORT:-8003}:8003"
    networks: [core_net]
    # FIX: telemetry now also waits for escalation-engine to be healthy
    # before starting. Previously it could start polling and try to POST
    # /evaluate to an engine that wasn't up yet, causing all escalation
    # calls to fail silently on first boot.
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      escalation-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  rag-proxy:
    build:
      context: ./rag_proxy
    image: deception/rag-proxy:latest
    container_name: rag-proxy
    restart: unless-stopped
    env_file: .env
    environment:
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - CHROMA_COLLECTION=${CHROMA_COLLECTION}
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - GROQ_API_URL=${GROQ_API_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - OPENAI_API_URL=${OPENAI_API_URL}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - RAG_PROXY_PORT=${RAG_PROXY_PORT:-8002}
    ports:
      - "${RAG_PROXY_PORT:-8002}:8002"
    networks: [core_net]
    depends_on:
      chromadb:
        condition: service_healthy
    # FIX: start_period raised to 40s. On cold start the RAG proxy
    # connects to ChromaDB and verifies/creates the collection, which can
    # take several seconds, causing the old 20s start_period to expire.
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  honeytrap:
    build:
      context: ./honeytrap
    image: deception/honeytrap:latest
    container_name: honeytrap
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - HONEYTRAP_PORT=${HONEYTRAP_PORT:-8004}
      - HONEYTOKEN_REFRESH_HOURS=${HONEYTOKEN_REFRESH_HOURS:-24}
    volumes:
      - honeytrap-data:/app/data
    ports:
      - "${HONEYTRAP_PORT:-8004}:8004"
    networks: [core_net]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # =============================== DASHBOARD ================================

  soc-chatbot:
    build:
      context: ./dashboard
    image: deception/soc-chatbot:latest
    container_name: soc-chatbot
    restart: unless-stopped
    env_file: .env
    environment:
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ESCALATION_URL=http://escalation-engine:${ESCALATION_PORT:-8001}
      - RAG_PROXY_URL=http://rag-proxy:${RAG_PROXY_PORT:-8002}
      - HONEYTRAP_URL=http://honeytrap:${HONEYTRAP_PORT:-8004}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8501}
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    networks: [core_net]
    depends_on:
      elasticsearch:
        condition: service_healthy
      escalation-engine:
        condition: service_healthy
      rag-proxy:
        condition: service_healthy
      honeytrap:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8501/_stcore/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
