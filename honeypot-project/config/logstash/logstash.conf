# config/logstash/logstash.conf
#
# FIXES applied vs original:
#
# 1. The original pipeline wrote JSON payload into event_data{} but the
#    top-level src_ip field was never populated for Cowrie events.
#    The chatbot's ES query for "event_data.src_ip.keyword" works only
#    when the field is nested under event_data — but Cowrie's JSON log
#    puts src_ip at the top level (as "src").  Fix: copy the top-level
#    src / dst fields into event_data so the telemetry parser finds them.
#
# 2. Elastichoney writes its own "timestamp" field (ISO8601) at the top
#    level, not inside the JSON body.  The date filter was looking inside
#    event_data.timestamp which missed it.  Added a fallback match on
#    [timestamp] directly.
#
# 3. Added remove_field cleanup to drop the noisy [agent], [ecs], [input]
#    and [log] Filebeat metadata fields that bloated every document.
#
# 4. AUDIT FIX (event separation): added an "event_class" field so infra
#    noise (Docker healthchecks connecting to Cowrie/Dionaea from the
#    loopback interface with no payload) is tagged "infra" right at ingest
#    time, distinct from "attack". Events keep going into the same
#    honeypot-%{honeypot}-%{+YYYY.MM.dd} index — nothing is dropped or
#    routed away — so existing Kibana saved searches/dashboards keep
#    working; add a filter on event_class to exclude infra noise from any
#    view. Telemetry (event_classifier.py) re-derives this independently
#    as a safety net, so processing is correct even if this field is ever
#    missing or wrong.

input {
  beats {
    port => 5044
  }
}

filter {
  # Tag by source path for routing / index naming
  if [log][file][path] =~ "cowrie" {
    mutate { add_field => { "honeypot" => "cowrie" } }
  } else if [log][file][path] =~ "dionaea" {
    mutate { add_field => { "honeypot" => "dionaea" } }
  } else if [log][file][path] =~ "elastichoney" {
    mutate { add_field => { "honeypot" => "elastichoney" } }
  } else {
    mutate { add_field => { "honeypot" => "unknown" } }
  }

  # The honeypots emit JSON already encoded as a string in [message]; parse it.
  #
# Filebeat already parses Cowrie JSON into [json].
# Rename it so the rest of the pipeline always uses event_data.
#

 if [json] {
    mutate {
      rename => {
        "[json]" => "[event_data]"
      }
    }
  }
  # FIX: Cowrie writes src_ip as "src" at the top level of its JSON.
  # Copy it into event_data so downstream consumers find it consistently.
  if [event_data][src] and ![event_data][src_ip] {
    mutate {
      copy => { "[event_data][src]" => "[event_data][src_ip]" }
    }
  }

  # FIX: also lift the top-level src_ip / src fields into event_data for
  # Elastichoney, which writes them at the root of its JSON log record.
  if [src_ip] and ![event_data][src_ip] {
    mutate {
      copy => { "src_ip" => "[event_data][src_ip]" }
    }
  }

  # Parse the event timestamp from multiple possible locations.
  # FIX: added fallback match on top-level [timestamp] for Elastichoney.
  date {
  match => ["[event_data][timestamp]", "ISO8601"]
  target => "@timestamp"
}

  mutate {
    add_field => { "pipeline" => "honeypot-ingest" }
    # FIX: remove noisy Filebeat metadata to keep documents lean.
    remove_field => ["agent", "ecs", "input", "log", "tags"]
  }

  # AUDIT FIX: classify infra (healthcheck) noise vs. real attacker
  # activity. Docker's healthcheck for Cowrie/Dionaea connects from the
  # loopback interface (127.0.0.1) and never sends a real command/URL/
  # filename — a real attacker, even on a private lab network, is never
  # 127.0.0.1. We deliberately only match loopback here (not all private
  # ranges) so genuine attacker traffic is never miscategorized.
  if [event_data][src_ip] {
    cidr {
      address => ["%{[event_data][src_ip]}"]
      network => ["127.0.0.0/8"]
      add_tag => ["loopback_source"]
    }
  }

  if "loopback_source" in [tags] and ![event_data][input] and ![event_data][command] and ![event_data][url] and ![event_data][filename] {
    mutate { add_field => { "event_class" => "infra" } }
  } else {
    mutate { add_field => { "event_class" => "attack" } }
  }

  # The cidr filter's own bookkeeping tag isn't useful downstream.
  mutate { remove_tag => ["loopback_source"] }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST}"]
    index => "honeypot-%{honeypot}-%{+YYYY.MM.dd}"
  }

  # Uncomment for local debugging
  # stdout { codec => rubydebug }
}
